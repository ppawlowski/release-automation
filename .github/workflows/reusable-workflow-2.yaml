name: Checkout2

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Print something
        uses: actions/github-script@v8.0.0
        with:
          script: |
            console.log("Hello from reusable workflow 2!")
            console.log(Error("This is fixed error message from reusable workflow 2"))
