name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component:
          - { name: reusable-workflow-1, path: .github/workflows/reusable-workflow-1.yaml }
          - { name: reusable-workflow-2, path: .github/workflows/reusable-workflow-2.yaml }
          - { name: npm_test,            path: 'actions/npm_test/**' }
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute next version
        id: bump
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: >-
            --include-path ${{ matrix.component.path }}
            --tag-pattern ^${{ matrix.component.name }}/v
            --bumped-version

      - name: Decide whether to release
        id: decide
        env:
          NEW_VERSION: ${{ steps.bump.outputs.version }}
          COMPONENT: ${{ matrix.component.name }}
        run: |
          set -euo pipefail
          VERSION="${NEW_VERSION#${COMPONENT}/}"
          VERSION="${VERSION#v}"
          LATEST=$(git tag -l "${COMPONENT}/v*" --sort=-v:refname | head -n1 || true)
          NEW_TAG="${COMPONENT}/v${VERSION}"
          if [ -z "$VERSION" ] || [ "$NEW_TAG" = "$LATEST" ]; then
            echo "No release needed for ${COMPONENT} (latest=${LATEST:-<none>}, computed=${NEW_TAG})"
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Will release ${NEW_TAG} (previous=${LATEST:-<none>})"
            echo "release=true"        >> "$GITHUB_OUTPUT"
            echo "tag=${NEW_TAG}"      >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}"  >> "$GITHUB_OUTPUT"
          fi

      - name: Tag
        if: steps.decide.outputs.release == 'true'
        env:
          TAG: ${{ steps.decide.outputs.tag }}
          COMPONENT: ${{ matrix.component.name }}
          VERSION: ${{ steps.decide.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          MAJOR="${VERSION%%.*}"
          REST="${VERSION#*.}"
          MINOR="${REST%%.*}"

          git tag -a "$TAG" -m "$TAG"
          git push origin "$TAG"

          git tag -f "${COMPONENT}/v${MAJOR}"
          git tag -f "${COMPONENT}/v${MAJOR}.${MINOR}"
          git push origin -f "${COMPONENT}/v${MAJOR}" "${COMPONENT}/v${MAJOR}.${MINOR}"
